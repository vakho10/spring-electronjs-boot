appId: io.github.vakho10.spring-electronjs-boot
productName: spring-electronjs-boot
directories:
  output: release
files:
  - out/**/*
  - package.json
# Bundle the Spring Boot jar next to the app. At runtime jarPath() resolves it
# as process.resourcesPath/app.jar when app.isPackaged (see src/main/index.ts).
# The jar must be built first: (cd ../backend && mvn package -DskipTests).
extraResources:
  - from: ../backend/target/app.jar
    to: app.jar
  # Trimmed JRE built by scripts/make-runtime.mjs so users need no Java install.
  - from: runtime
    to: runtime
  # The window icon, resolved at runtime via process.resourcesPath.
  - from: build/icon.png
    to: icon.png
win:
  target: nsis
  # 512×512 PNG; electron-builder derives the multi-resolution .ico from it.
  icon: build/icon.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  # Dash-cased so the release asset name has no spaces.
  artifactName: spring-electronjs-boot-Setup-${version}.${ext}
