<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'none'"
    />
    <title>spring-electronjs-boot</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Electron + Spring Boot</h1>
      <p class="subtitle">A proof of concept: calling Java from Electron over localhost.</p>

      <div class="row">
        <button id="hello" type="button">Say Hello</button>
      </div>

      <div class="row">
        <input id="name" type="text" placeholder="Enter your name" />
        <button id="greet" type="button">Greet Me</button>
      </div>

      <p id="output" class="output">—</p>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
